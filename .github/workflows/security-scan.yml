name: AppSec Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scan:
    name: Run Security Tools
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем ВСЮ историю кода (нужно для TruffleHog)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Шаг 2: Сканер секретов по официальному гайду
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

      # Шаг 3: Статический анализ кода (Semgrep)
      - name: Semgrep SAST Scan (OSS Mode)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep semgrep scan --config=p/default